spring:
  datasource:
    url: jdbc:h2:mem:picmeup-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

aws:
  region: ap-southeast-2
  s3:
    bucket: test-bucket
  rekognition:
    confidence-threshold: 80.0
