spring:
  datasource:
    url: jdbc:h2:mem:picmeup-test;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

aws:
  region: us-east-1
  s3:
    bucket: test-bucket
  rekognition:
    confidence-threshold: 80.0

app:
  admin:
    username: admin
    password: "{noop}admin123"
  email:
    sender: test@example.com
    admin-recipients: admin@example.com
