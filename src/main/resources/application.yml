spring:
  application:
    name: picmeup
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: 8080
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml
    min-response-size: 1024

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: http://localhost:5173
  admin:
    username: admin
    password: "{noop}admin123"
  email:
    sender: ${EMAIL_SENDER:noreply@elitesportphotos.com}
    admin-recipients: ${EMAIL_ADMIN_RECIPIENTS:trent@elitesportphotos.com,murillo.cg@gmail.com}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/picmeup
    username: picmeup
    password: picmeup
  jpa:
    show-sql: true

aws:
  region: us-east-1
  s3:
    bucket: picmeup-photos
    endpoint: http://localhost:4566
  rekognition:
    endpoint: http://localhost:4566
    confidence-threshold: 80.0

stripe:
  api-key: ${STRIPE_API_KEY:sk_test_placeholder}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/picmeup
    username: picmeup
    password: ${DB_PASSWORD}

aws:
  region: us-east-1
  s3:
    bucket: picmeup-photos-dev
  rekognition:
    confidence-threshold: 80.0

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

aws:
  region: us-east-1
  s3:
    bucket: ${S3_BUCKET}
  rekognition:
    confidence-threshold: 85.0

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  admin:
    username: ${ADMIN_USERNAME:admin}
    password: ${ADMIN_PASSWORD}

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
